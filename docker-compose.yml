services:
  postgres-dev:
    image: postgres:16-alpine
    container_name: lab_mouse_sales_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: lab_mouse_sales_dev
      POSTGRES_USER: lab_mouse_dev
      POSTGRES_PASSWORD: lab_mouse_dev_password
    ports:
      - "55432:5432"
    volumes:
      - lab_mouse_sales_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab_mouse_dev -d lab_mouse_sales_dev"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  lab_mouse_sales_pgdata: